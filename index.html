<!DOCTYPE html>
<html lang="th">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0, maximum-scale=1.0">

<title>Moisture Calculator</title>

<!-- Bootstrap -->

<link
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
rel="stylesheet">

<!-- Bootstrap Icons -->

<link
rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

<style>

/* Reset */

*{
    box-sizing:border-box;
    margin:0;
    padding:0;
}

/* Body */

body{

    min-height:100vh;

    display:flex;
    justify-content:center;
    align-items:center;

    padding:15px;

    overflow-x:hidden;

    font-family:
    -apple-system,
    BlinkMacSystemFont,
    "Segoe UI",
    sans-serif;

    background:
    linear-gradient(
        135deg,
        #dff6e3,
        #cdeed4,
        #b7e6c0
    );
}

/* Floating Glass Card */

.glass-card{

    width:100%;
    max-width:520px;

    padding:28px;

    border-radius:28px;

    background:
    rgba(255,255,255,0.38);

    backdrop-filter:blur(18px);

    border:
    1px solid rgba(255,255,255,0.35);

    box-shadow:
    0 8px 30px rgba(0,0,0,0.12);

    animation:
    fadeIn 0.6s ease;
}

/* Animation */

@keyframes fadeIn{

    from{
        opacity:0;
        transform:translateY(20px);
    }

    to{
        opacity:1;
        transform:translateY(0);
    }
}

/* Title */

.title{

    text-align:center;
    margin-bottom:24px;
}

.title h1{

    font-size:32px;
    font-weight:700;

    color:#198754;
}

.title p{

    color:#4f6f57;
    margin-top:5px;
}

/* Labels */

.form-label{

    font-weight:600;

    color:#2f4f36;

    margin-bottom:8px;
}

/* Inputs */

.form-control{

    width:100%;

    height:56px;

    border:none;

    border-radius:18px;

    background:
    rgba(255,255,255,0.75);

    padding:12px 16px;

    font-size:17px;

    box-shadow:
    inset 2px 2px 6px rgba(0,0,0,0.05);

    transition:0.2s;
}

.form-control:focus{

    outline:none;

    box-shadow:
    0 0 0 4px rgba(25,135,84,0.15);
}

/* Button */

.btn-calc{

    width:100%;

    height:58px;

    border:none;

    border-radius:20px;

    background:
    linear-gradient(
        135deg,
        #34c759,
        #198754
    );

    color:white;

    font-size:20px;
    font-weight:bold;

    transition:0.25s;
}

/* Hover */

.btn-calc:hover{

    transform:
    translateY(-2px);

    box-shadow:
    0 10px 20px rgba(25,135,84,0.25);
}

/* Active */

.btn-calc:active{

    transform:scale(0.98);
}

/* Result */

.result-box{

    display:none;

    margin-top:24px;

    padding:22px;

    border-radius:22px;

    background:
    rgba(255,255,255,0.55);

    border:
    1px solid rgba(255,255,255,0.4);

    backdrop-filter:blur(10px);

    line-height:2;

    font-size:18px;

    color:#1d3c28;

    word-break:break-word;
}

/* Result Title */

.result-title{

    font-size:22px;
    font-weight:bold;

    color:#198754;

    margin-bottom:10px;
}

/* Footer */

.footer{

    text-align:center;

    margin-top:18px;

    color:#557b60;

    font-size:14px;
}

/* Tablet */

@media (max-width:768px){

    .glass-card{

        max-width:95%;
        padding:24px;
    }

    .title h1{

        font-size:28px;
    }

    .form-control{

        height:54px;
        font-size:16px;
    }

    .btn-calc{

        height:54px;
        font-size:18px;
    }
}

/* Mobile */

@media (max-width:480px){

    body{

        padding:10px;
        align-items:flex-start;
    }

    .glass-card{

        padding:20px;

        border-radius:22px;
    }

    .title h1{

        font-size:24px;
    }

    .title p{

        font-size:14px;
    }

    .form-control{

        height:50px;

        font-size:15px;

        border-radius:16px;
    }

    .btn-calc{

        height:52px;

        font-size:17px;

        border-radius:18px;
    }

    .result-box{

        font-size:16px;

        line-height:1.8;
    }
}

/* Large Screen */

@media (min-width:1200px){

    .glass-card{

        max-width:560px;
    }
}

</style>

</head>

<body>

<div class="glass-card">

    <div class="title">

        <h1>
            <i class="bi bi-droplet-half"></i>
            Moisture Calculator
        </h1>

        <p>
            Responsive Modern UI
        </p>

    </div>

    <div class="mb-3">

        <label class="form-label">
            Sand (Kg)
        </label>

        <input
            type="number"
            id="x"
            class="form-control"
            placeholder="กรอกน้ำหนักทราย">

    </div>

    <div class="mb-3">

        <label class="form-label">
            Moisture (%)
        </label>

        <input
            type="number"
            id="y"
            class="form-control"
            placeholder="กรอกค่า Moisture">

    </div>

    <div class="mb-3">

        <label class="form-label">
            Water (Kg)
        </label>

        <input
            type="number"
            id="water"
            class="form-control"
            placeholder="กรอกน้ำหนักน้ำ">

    </div>

    <div class="mb-4">

        <label class="form-label">
            Batch (คิว)
        </label>

        <input
            type="number"
            id="batch"
            class="form-control"
            placeholder="กรอกจำนวน Batch">

    </div>

    <button
        class="btn-calc"
        onclick="calculate()">

        <i class="bi bi-lightning-charge-fill"></i>
        Calculate

    </button>

    <div
        class="result-box"
        id="result">
    </div>

    <div class="footer">

        รองรับ iPhone • Android • iPad

    </div>

</div>

<script>

function calculate(){

    let x =
    parseFloat(
        document.getElementById("x").value
    ) || 0;

    let yPercent =
    parseFloat(
        document.getElementById("y").value
    ) || 0;

    let water =
    parseFloat(
        document.getElementById("water").value
    ) || 0;

    let batch =
    parseFloat(
        document.getElementById("batch").value
    ) || 0;

    let y = yPercent / 100;

    // Moisture

    let moisture =
    x * (
        y +
        Math.pow(y,2) +
        Math.pow(y,3)
    );

    // Total / Batch

    let totalPerBatch =
    x + moisture;

    // Grand Total

    let grandTotal =
    totalPerBatch * batch;

    // Water - Moisture

    let waterMinusMoisture =
    water - moisture;

    document
    .getElementById("result")
    .style.display = "block";

    document
    .getElementById("result")
    .innerHTML = `

        <div class="result-title">
            📊 Result
        </div>

        <hr>

        <strong>Moisture :</strong>
        ${moisture.toFixed(2)} KG
        <br>

        <strong>Water - Moisture :</strong>
        ${waterMinusMoisture.toFixed(2)} KG
        <br>

        <strong>Total / Batch :</strong>
        ${totalPerBatch.toFixed(2)} KG
        <br>

        <strong>Batch :</strong>
        ${batch}
        <br>

        <strong>Target Total :</strong>
        ${grandTotal.toFixed(2)} KG

    `;
}

</script>

</body>
</html>
