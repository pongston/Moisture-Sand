<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Moisture Calculator</title>

<link
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
rel="stylesheet">

<link
rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

<style>

*{
    box-sizing:border-box;
}

body{

    margin:0;
    min-height:100vh;

    display:flex;
    justify-content:center;
    align-items:center;

    padding:20px;

    font-family:
    -apple-system,
    BlinkMacSystemFont,
    "Segoe UI",
    sans-serif;

    background:
    linear-gradient(
        135deg,
        #dff6e3,
        #c8f0d0,
        #b9eac3
    );

    overflow:hidden;
}

/* Glow Background */

body::before{

    content:"";

    position:absolute;

    width:400px;
    height:400px;

    background:#ffffff55;

    border-radius:50%;

    top:-120px;
    left:-120px;

    filter:blur(60px);
}

body::after{

    content:"";

    position:absolute;

    width:350px;
    height:350px;

    background:#ffffff44;

    border-radius:50%;

    bottom:-100px;
    right:-100px;

    filter:blur(60px);
}

/* Card */

.glass-card{

    width:100%;
    max-width:500px;

    padding:30px;

    border-radius:30px;

    backdrop-filter:blur(18px);

    background:rgba(255,255,255,0.35);

    border:1px solid rgba(255,255,255,0.4);

    box-shadow:
    0 8px 32px rgba(0,0,0,0.12);

    position:relative;
    z-index:1;
}

/* Title */

.title{

    text-align:center;
    margin-bottom:25px;
}

.title h1{

    font-size:32px;
    font-weight:700;
    color:#198754;
}

.title p{

    color:#4f6f57;
    margin:0;
}

/* Inputs */

.form-label{

    font-weight:600;
    color:#2f4f36;
}

.form-control{

    height:55px;

    border:none;

    border-radius:18px;

    background:rgba(255,255,255,0.7);

    box-shadow:
    inset 2px 2px 6px rgba(0,0,0,0.05);

    font-size:17px;
}

.form-control:focus{

    box-shadow:
    0 0 0 4px rgba(25,135,84,0.15);

    border:none;
}

/* Button */

.btn-calc{

    width:100%;
    height:58px;

    border:none;

    border-radius:20px;

    background:
    linear-gradient(
        135deg,
        #34c759,
        #198754
    );

    color:white;

    font-size:20px;
    font-weight:bold;

    transition:0.25s;
}

/* Hover */

.btn-calc:hover{

    transform:translateY(-2px) scale(1.01);

    box-shadow:
    0 10px 20px rgba(25,135,84,0.25);
}

/* Click */

.btn-calc:active{

    transform:scale(0.97);
}

/* Result */

.result-box{

    margin-top:25px;

    padding:22px;

    border-radius:22px;

    background:rgba(255,255,255,0.55);

    border:1px solid rgba(255,255,255,0.35);

    backdrop-filter:blur(10px);

    line-height:2;

    font-size:18px;

    color:#1d3c28;

    display:none;
}

/* Result title */

.result-title{

    font-size:22px;
    font-weight:bold;

    color:#198754;

    margin-bottom:10px;
}

/* Footer */

.footer{

    text-align:center;

    margin-top:18px;

    font-size:14px;

    color:#557b60;
}

/* Mobile */

@media(max-width:480px){

    .glass-card{

        padding:22px;
    }

    .title h1{

        font-size:26px;
    }

}

</style>
</head>

<body>

<div class="glass-card">

    <div class="title">

        <h1>
            <i class="bi bi-droplet-half"></i>
            Moisture Calculator
        </h1>

        <p>
            Green Pastel Glassmorphism UI
        </p>

    </div>

    <div class="mb-3">

        <label class="form-label">
            Sand (Kg)
        </label>

        <input
            type="number"
            id="x"
            class="form-control"
            placeholder="กรอกน้ำหนักทราย">

    </div>

    <div class="mb-3">

        <label class="form-label">
            Moisture (%)
        </label>

        <input
            type="number"
            id="y"
            class="form-control"
            placeholder="กรอกค่า Moisture">

    </div>

    <div class="mb-3">

        <label class="form-label">
            Water (Kg)
        </label>

        <input
            type="number"
            id="water"
            class="form-control"
            placeholder="กรอกน้ำหนักน้ำ">

    </div>

    <div class="mb-4">

        <label class="form-label">
            Batch (คิว)
        </label>

        <input
            type="number"
            id="batch"
            class="form-control"
            placeholder="กรอกจำนวน Batch">

    </div>

    <button
        class="btn-calc"
        onclick="calculate()">

        <i class="bi bi-lightning-charge-fill"></i>
        Calculate

    </button>

    <div
        class="result-box"
        id="result">
    </div>

    <div class="footer">
        Modern iPhone Style UI
    </div>

</div>

<script>

function calculate(){

    let x =
    parseFloat(
        document.getElementById("x").value
    ) || 0;

    let yPercent =
    parseFloat(
        document.getElementById("y").value
    ) || 0;

    let water =
    parseFloat(
        document.getElementById("water").value
    ) || 0;

    let batch =
    parseFloat(
        document.getElementById("batch").value
    ) || 0;

    let y = yPercent / 100;

    // Moisture

    let moisture =
    x * (
        y +
        Math.pow(y,2) +
        Math.pow(y,3)
    );

    // Total / Batch

    let totalPerBatch =
    x + moisture;

    // Grand Total

    let grandTotal =
    totalPerBatch * batch;

    // Water - Moisture

    let waterMinusMoisture =
    water - moisture;

    document
    .getElementById("result")
    .style.display = "block";

    document
    .getElementById("result")
    .innerHTML = `

        <div class="result-title">
            📊 Result
        </div>

        <hr>

        <strong>Moisture :</strong>
        ${moisture.toFixed(2)} KG
        <br>

        <strong>Water - Moisture :</strong>
        ${waterMinusMoisture.toFixed(2)} KG
        <br>

        <strong>Total / Batch :</strong>
        ${totalPerBatch.toFixed(2)} KG
        <br>

        <strong>Batch :</strong>
        ${batch}
        <br>

        <strong>Target Total :</strong>
        ${grandTotal.toFixed(2)} KG

    `;
}

</script>

</body>
</html>
